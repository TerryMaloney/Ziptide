name: Acquire Unity Activation File

# ONE-TIME helper to activate a Unity PERSONAL license for CI.
# How to use:
#   1. GitHub > Actions tab > "Acquire Unity Activation File" > Run workflow.
#   2. When it finishes, open the run and download the "Unity_Activation_File" artifact
#      (it contains a Unity_v2022.x.alf file). Unzip it.
#   3. Go to https://license.unity3d.com/manual , sign in, upload the .alf,
#      choose "Unity Personal / free", and download the resulting .ulf file.
#   4. Open the .ulf in a text editor and copy ALL of its contents.
#   5. Repo > Settings > Secrets and variables > Actions > New repository secret:
#        Name: UNITY_LICENSE   Value: (paste the entire .ulf contents)
#      Then add two more secrets:
#        Name: UNITY_EMAIL     Value: your Unity account email
#        Name: UNITY_PASSWORD  Value: your Unity account password
#   6. Done. The main CI workflow (ci.yml) will now activate and run.
#      You can delete this workflow file afterward if you want.

on:
  workflow_dispatch:

jobs:
  activation:
    name: Request activation file
    runs-on: ubuntu-latest
    steps:
      - name: Request manual activation file
        id: getManualLicenseFile
        uses: game-ci/unity-request-activation-file@v2
        with:
          unityVersion: 2022.3.62f3

      - name: Upload activation file
        uses: actions/upload-artifact@v4
        with:
          name: Unity_Activation_File
          path: ${{ steps.getManualLicenseFile.outputs.filePath }}
