name: CI

# Compiles the Unity project and runs EditMode tests on every push/PR.
#
# REQUIRED repository secrets (Settings > Secrets and variables > Actions):
#   UNITY_LICENSE  - contents of your Unity Personal .ulf license file
#   UNITY_EMAIL    - your Unity account email
#   UNITY_PASSWORD - your Unity account password

on:
  push:
    branches:
      - main
      - 'claude/**'
      - terry-local-wip
  pull_request:
    branches:
      - main
  workflow_dispatch:

# unity-test-runner publishes results as a GitHub Check, which needs write access.
# Without this the default GITHUB_TOKEN is read-only and the run fails at the very end
# with "Resource not accessible by integration" even when compile + tests succeed.
permissions:
  checks: write
  contents: read

# The Unity project lives in the Ziptide/ subfolder of the repo.
env:
  PROJECT_PATH: Ziptide
  UNITY_VERSION: 2022.3.62f3

jobs:
  test:
    name: EditMode tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: Library-test-${{ hashFiles(format('{0}/Assets/**', env.PROJECT_PATH), format('{0}/Packages/**', env.PROJECT_PATH), format('{0}/ProjectSettings/**', env.PROJECT_PATH)) }}
          restore-keys: |
            Library-test-
            Library-

      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: editmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          artifactsPath: test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results

  build-android:
    name: Build Android APK
    needs: test
    runs-on: ubuntu-latest
    # Android builds are slow, so they don't run on every push. They run:
    #   - on demand: Actions tab > CI > "Run workflow" (any branch), or an agent triggers it via the
    #     GitHub API after pushing a device-test-worthy change, or
    #   - automatically on push to main.
    # The build runs the SAME path as the local PC build (BuildAndroid.PatchScenesThenAPK): it patches
    # every scene, runs the world audit (a BLOCKER fails the run), then produces the APK — so build
    # breakage is caught in the cloud BEFORE the headset, and the APK is downloadable as an artifact.
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: ${{ env.PROJECT_PATH }}/Library
          key: Library-android-${{ hashFiles(format('{0}/Assets/**', env.PROJECT_PATH), format('{0}/Packages/**', env.PROJECT_PATH), format('{0}/ProjectSettings/**', env.PROJECT_PATH)) }}
          restore-keys: |
            Library-android-
            Library-

      - name: Build (Android)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: ${{ env.PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: Android
          # Run our real build entrypoint (patch scenes + audit + APK) instead of the default build,
          # so CI exercises exactly what the PC build does.
          buildMethod: Ziptide.Build.BuildAndroid.PatchScenesThenAPK
          # The scene patchers modify scenes/assets during the build, which dirties the working tree.
          allowDirtyBuild: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ziptide-apk
          path: ${{ env.PROJECT_PATH }}/Builds/Android/Ziptide.apk
          if-no-files-found: warn
